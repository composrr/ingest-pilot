<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingest Pilot</title>
    <!-- Theme bootstrap: set data-theme before first paint so there's no
         light-flash. Defaults to dark when nothing is stored yet (first run /
         onboarding). Kept in sync at runtime by src/lib/theme.ts. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("ingest-pilot:theme");
          document.documentElement.setAttribute(
            "data-theme",
            t === "light" ? "light" : "dark"
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
