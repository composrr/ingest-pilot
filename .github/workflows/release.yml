name: Release

# Builds installers for macOS (universal), Windows, and Linux, signs them for the
# auto-updater, and publishes them (plus latest.json) to the PUBLIC releases repo
# composrr/ingest-pilot-releases. Source stays private; the app fetches updates
# from the public repo with no auth. Push a version tag (e.g. `git tag v0.1.4 &&
# git push origin v0.1.4`) and this runs automatically.
#
# Release flow (three jobs):
#   1. create-release  - make one empty DRAFT release, output its numeric id.
#   2. build (matrix)  - build/sign each platform and upload into that draft, one
#                        platform at a time so the per-platform latest.json merges
#                        don't race.
#   3. publish         - flip the draft to published ONLY after all three succeed.
# GitHub's "latest release" endpoint ignores drafts, so the updater keeps offering
# the previous complete release until the new one is fully built and downloadable -
# no mid-build "None of the fallback platforms" errors, and a build that fails on any
# platform never reaches users (it just leaves a draft to inspect or delete).
#
# You can also trigger it manually (Actions -> Release -> Run workflow) for a tag
# that already exists.
#
# Required repository secrets (see docs/AUTO_UPDATE.md for the one-time setup):
#   RELEASES_TOKEN                     PAT with contents:write on the releases repo
#   TAURI_SIGNING_PRIVATE_KEY          contents of ~/.tauri/ingest-pilot-updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD empty string (the key was generated with no password)
# The releases repo must exist and have an initial commit on its `main` branch.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach installers to (e.g. v0.1.2)"
        required: true

permissions:
  contents: write

jobs:
  # 1) Create an empty DRAFT release on the public releases repo and hand its numeric
  # id to the build jobs. Drafts are invisible to the "latest release" endpoint, so the
  # updater keeps offering the previous release until `publish` runs.
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.mk.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Prepare release notes
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          NOTES_FILE="release-notes.md"
          # Pull the changelog section for this version out of CHANGELOG.md:
          # everything between "## [VERSION]" (or "## VERSION") and the next "## ".
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[?" ver "\\]?([^0-9]|$)" { grab=1; next }
              grab && /^## / { exit }
              grab { print }
            ' CHANGELOG.md > "$NOTES_FILE"
          fi
          # Fall back to a generic note so the release always has a body.
          if [ ! -s "$NOTES_FILE" ]; then
            printf "Ingest Pilot %s\n\nThis release includes general improvements and fixes.\n" "$VERSION" > "$NOTES_FILE"
          fi

      - name: Create draft release
        id: mk
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          REPO="composrr/ingest-pilot-releases"
          # Reuse an existing draft for this tag if a prior run left one; else create it.
          release_id=$(gh api "repos/$REPO/releases" --paginate \
            -q '[.[] | select(.tag_name=="'"$TAG"'" and .draft==true)][0].id // empty')
          if [ -z "$release_id" ]; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --draft \
              --target main \
              --title "Ingest Pilot $TAG" \
              --notes-file release-notes.md
            release_id=$(gh api "repos/$REPO/releases" --paginate \
              -q '[.[] | select(.tag_name=="'"$TAG"'" and .draft==true)][0].id')
          fi
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  # 2) Build + sign each platform and upload into that one draft release. Serialized so
  # the per-platform latest.json merges don't race (a Windows entry went missing in
  # v0.1.6 when the platforms ran in parallel).
  build:
    name: Build ${{ matrix.label }}
    needs: create-release
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            label: macOS (universal)
            args: "--target universal-apple-darwin"
            targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - os: ubuntu-22.04
            label: Linux
            args: ""
            targets: ""
          - os: windows-latest
            label: Windows
            args: ""
            targets: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install JS dependencies
        run: npm ci

      - name: Build and upload to the draft release
        uses: tauri-apps/tauri-action@v0
        env:
          # PAT with contents:write on the PUBLIC releases repo (cross-repo publish).
          GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          # Updater signing (minisign). The password is empty by design - the
          # secret value itself is the protection. See docs/AUTO_UPDATE.md.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload installers + latest.json into the draft release created above.
          owner: composrr
          repo: ingest-pilot-releases
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # Point the updater at the NSIS (setup.exe) bundle on Windows so the
          # "passive" install mode applies.
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  # 3) Publish the draft only after ALL platforms built successfully. `needs: build`
  # gates on the whole matrix, so a partial or failed build never goes live. Until this
  # runs, the updater sees the previous release and offers nothing new.
  publish:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          gh api -X PATCH \
            "repos/composrr/ingest-pilot-releases/releases/${{ needs.create-release.outputs.release_id }}" \
            -F draft=false -f make_latest=true
