name: Release

# Builds installers for macOS (universal), Windows, and Linux and attaches them
# to a GitHub Release. Push a version tag (e.g. `git tag v0.1.3 && git push origin
# v0.1.3`) and this runs automatically — no need to build on each OS by hand.
#
# You can also trigger it manually (Actions -> Release -> Run workflow) for a tag
# that already exists; tauri-action appends the built installers to that release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach installers to (e.g. v0.1.2)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (universal)
            args: "--target universal-apple-darwin"
            targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - os: ubuntu-22.04
            label: Linux
            args: ""
            targets: ""
          - os: windows-latest
            label: Windows
            args: ""
            targets: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install JS dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Ingest Pilot ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: "Download the installer for your platform from the assets below."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
